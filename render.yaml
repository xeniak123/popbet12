services:
  - type: web
    name: popbet-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MONGO_URL
        sync: false # wartość wkleisz recznie w panelu Render (sekret)
      - key: DB_NAME
        value: popbet_database
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_KEY
        sync: false # wklej wlasny klucz w panelu Render
      - key: APIFOOTBALL_KEY
        sync: false # klucz z dashboard.api-football.com (automat sportowy)

      - key: ACCESS_TOKEN_DAYS
        value: "30"
