name: Build iOS IPA (unsigned, dla AltStore)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag wydania (np. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalacja zaleznosci
        working-directory: frontend
        run: npm ci

      - name: Konfiguracja backendu (wkompilowana w apke)
        working-directory: frontend
        run: echo "EXPO_PUBLIC_BACKEND_URL=https://popbet-backend.onrender.com" > .env

      - name: Expo prebuild (generuje projekt iOS + pod install)
        working-directory: frontend
        run: npx expo prebuild --platform ios

      - name: Build bez podpisu
        working-directory: frontend
        run: |
          xcodebuild \
            -workspace ios/PopBet.xcworkspace \
            -scheme PopBet \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Pakowanie .ipa
        working-directory: frontend
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/PopBet.app Payload/
          zip -qry PopBet.ipa Payload

      - name: Generowanie altstore/source.json
        run: |
          python3 - <<'EOF'
          import json, os, plistlib, datetime

          plist_path = "frontend/Payload/PopBet.app/Info.plist"
          with open(plist_path, "rb") as f:
              info = plistlib.load(f)

          tag = os.environ["RELEASE_TAG"]
          repo = os.environ["GITHUB_REPOSITORY"]
          size = os.path.getsize("frontend/PopBet.ipa")
          privacy = {k: v for k, v in info.items() if k.endswith("UsageDescription")}

          source = {
              "name": "PopBet Store",
              "subtitle": "Obstawiaj popkulturę za wirtualne monety",
              "description": "Oficjalne źródło aplikacji PopBet — zakłady o sport, muzykę, nagrody i plotki, za wirtualne monety, bez prawdziwych pieniędzy.",
              "iconURL": f"https://raw.githubusercontent.com/{repo}/main/frontend/assets/images/icon.png",
              "website": f"https://github.com/{repo}",
              "tintColor": "#5B9BD5",
              "apps": [{
                  "name": "PopBet",
                  "bundleIdentifier": info["CFBundleIdentifier"],
                  "developerName": "xeniak123",
                  "subtitle": "Typuj, wygrywaj monety, rywalizuj ze znajomymi",
                  "iconURL": f"https://raw.githubusercontent.com/{repo}/main/frontend/assets/images/icon.png",
                  "localizedDescription": "PopBet to rozrywkowa apka do obstawiania wydarzeń popkulturowych: sport, muzyka, nagrody, reality TV i plotki. Grasz wyłącznie za wirtualne monety.",
                  "category": "entertainment",
                  "versions": [{
                      "version": info.get("CFBundleShortVersionString", "1.0.0"),
                      "buildVersion": str(info.get("CFBundleVersion", "1")),
                      "date": datetime.date.today().isoformat(),
                      "downloadURL": f"https://github.com/{repo}/releases/download/{tag}/PopBet.ipa",
                      "size": size,
                      "minOSVersion": info.get("MinimumOSVersion", "15.1"),
                  }],
                  "appPermissions": {
                      "entitlements": [],
                      "privacy": privacy,
                  },
              }],
              "news": [],
          }
          os.makedirs("altstore", exist_ok=True)
          with open("altstore/source.json", "w", encoding="utf-8") as f:
              json.dump(source, f, ensure_ascii=False, indent=2)
          print(json.dumps(source, ensure_ascii=False, indent=2))
          EOF
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag }}

      - name: Utworzenie Release z .ipa
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.event.inputs.tag }}" frontend/PopBet.ipa \
            --title "PopBet ${{ github.event.inputs.tag }}" \
            --notes "Niepodpisany build iOS do instalacji przez AltStore/Sideloadly. Źródło AltStore: https://raw.githubusercontent.com/${{ github.repository }}/main/altstore/source.json" \
            || gh release upload "${{ github.event.inputs.tag }}" frontend/PopBet.ipa --clobber

      - name: Dolaczenie source.json do Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.inputs.tag }}" altstore/source.json --clobber
