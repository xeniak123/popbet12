name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag wydania (np. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalacja zaleznosci
        working-directory: frontend
        run: npm ci

      - name: Konfiguracja backendu (wkompilowana w apke)
        working-directory: frontend
        run: echo "EXPO_PUBLIC_BACKEND_URL=https://popbet-backend.onrender.com" > .env

      - name: Expo prebuild (generuje projekt Android)
        working-directory: frontend
        run: npx expo prebuild --platform android

      - name: Build release APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Podpisanie APK kluczem wydania
        working-directory: frontend
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > release.jks
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          cp android/app/build/outputs/apk/release/app-release.apk PopBet.apk
          $BUILD_TOOLS/apksigner sign --ks release.jks --ks-key-alias popbet \
            --ks-pass env:KEYSTORE_PASS --key-pass env:KEYSTORE_PASS PopBet.apk
          $BUILD_TOOLS/apksigner verify --print-certs PopBet.apk | head -3

      - name: Publikacja w Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.event.inputs.tag }}" frontend/PopBet.apk \
            --title "PopBet ${{ github.event.inputs.tag }}" \
            --notes "PopBet dla Androida — pobierz PopBet.apk i zainstaluj." \
            || gh release upload "${{ github.event.inputs.tag }}" frontend/PopBet.apk --clobber
